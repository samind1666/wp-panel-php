<?xml version="1.0" encoding="UTF-8"?>
<!--
  WP Hosting Panel - OpenLiteSpeed Virtual Host Template
  Placeholders:
    {{DOMAIN}}      - The domain name (e.g. example.com)
    {{DOC_ROOT}}    - Document root path (e.g. /home/example/public_html)
    {{PHP_VERSION}} - PHP version (e.g. 80, 81, 82, 83)
    {{HOME_DIR}}    - Site home directory (e.g. /home/example)
-->
<virtualHostConfig>
  <docRoot>{{DOC_ROOT}}</docRoot>
  <vhRoot>{{HOME_DIR}}</vhRoot>
  <enableGzip>1</enableGzip>

  <!-- ======================================================== -->
  <!--  Logging                                                  -->
  <!-- ======================================================== -->
  <log>
    <fileName>{{HOME_DIR}}/logs/error.log</fileName>
    <logLevel>ERROR</logLevel>
  </log>

  <accessLog>
    <fileName>{{HOME_DIR}}/logs/access.log</fileName>
    <logFormat>%h %l %u %t "%r" %>s %b "%{Referer}i" "%{User-Agent}i" %T "%{X-Forwarded-For}i"</logFormat>
    <logHeaders>4</logHeaders>
  </accessLog>

  <!-- ======================================================== -->
  <!--  Security Headers                                         -->
  <!-- ======================================================== -->
  <header>
    <add>X-Frame-Options "SAMEORIGIN" always</add>
    <add>X-Content-Type-Options "nosniff" always</add>
    <add>X-XSS-Protection "1; mode=block" always</add>
    <add>Referrer-Policy "strict-origin-when-cross-origin" always</add>
  </header>

  <!-- ======================================================== -->
  <!--  Index Files                                              -->
  <!-- ======================================================== -->
  <index>
    <useServer>0</useServer>
    <files>index.php index.html</files>
  </index>

  <!-- ======================================================== -->
  <!--  Gzip Compression                                        -->
  <!-- ======================================================== -->
  <gzip>
    <enable>1</enable>
    <compressibleTypes>text/plain, text/html, text/css, application/json, application/javascript, text/xml, application/xml, application/xml+rss, text/javascript, image/svg+xml</compressibleTypes>
    <minFileSize>300</minFileSize>
    <compressionLevel>6</compressionLevel>
  </gzip>

  <!-- ======================================================== -->
  <!--  Static File Caching (Browser)                            -->
  <!-- ======================================================== -->
  <expires>
    <enable>1</enable>
    <expiresDefault>A600</expiresDefault>
    <mimeTypes>
      <mime>image/*=A2592000</mime>
      <mime>text/css=A2592000</mime>
      <mime>application/javascript=A2592000</mime>
      <mime>application/x-javascript=A2592000</mime>
      <mime>font/*=A2592000</mime>
      <mime>font/woff2=A2592000</mime>
      <mime>font/woff=A2592000</mime>
      <mime>font/ttf=A2592000</mime>
      <mime>font/otf=A2592000</mime>
    </mimeTypes>
  </expires>

  <!-- ======================================================== -->
  <!--  Rewrite Rules (WordPress Permalinks)                     -->
  <!-- ======================================================== -->
  <rewrite>
    <enable>1</enable>
    <autoLoadHtaccess>0</autoLoadHtaccess>
    <rules><![CDATA[
RewriteCond %{REQUEST_FILENAME} !-f
RewriteCond %{REQUEST_FILENAME} !-d
RewriteRule ^(.*)$ /index.php?$1 [L,QSA]

# Block sensitive files
RewriteRule ^/(wp-config\.php|readme\.html|license\.txt|xmlrpc\.php) - [F,L]

# Block access to hidden files (.htaccess, .git, .env, etc.)
RewriteCond %{REQUEST_URI} ^/\.
RewriteRule .* - [F,L]
]]></rules>
  </rewrite>

  <!-- ======================================================== -->
  <!--  Context: PHP via lsphp                                   -->
  <!-- ======================================================== -->
  <context>
    <type>fcgi</type>
    <uri>/</uri>
    <handler>
      <type>lsapi:lsphp{{PHP_VERSION}}</type>
    </handler>
  </context>

  <context>
    <type>NULL</type>
    <uri>/favicon.ico</uri>
    <allowOverride>0</allowOverride>
    <extraHeaders>
      <add>X-LiteSpeed-Cache-Control:no-cache</add>
    </extraHeaders>
    <accessControl>
      <allow>ALL</allow>
    </accessControl>
  </context>

  <context>
    <type>NULL</type>
    <uri>/robots.txt</uri>
    <allowOverride>0</allowOverride>
    <accessControl>
      <allow>ALL</allow>
    </accessControl>
  </context>

  <!-- ======================================================== -->
  <!--  Block Sensitive Files (deny access)                      -->
  <!-- ======================================================== -->
  <context>
    <type>NULL</type>
    <uri>/wp-config.php</uri>
    <accessControl>
      <deny>ALL</deny>
    </accessControl>
  </context>

  <context>
    <type>NULL</type>
    <uri>/xmlrpc.php</uri>
    <accessControl>
      <deny>ALL</deny>
    </accessControl>
  </context>

  <context>
    <type>NULL</type>
    <uri>/readme.html</uri>
    <accessControl>
      <deny>ALL</deny>
    </accessControl>
  </context>

  <context>
    <type>NULL</type>
    <uri>/license.txt</uri>
    <accessControl>
      <deny>ALL</deny>
    </accessControl>
  </context>

  <!-- Block hidden files (.ht, .env, .git, etc.) -->
  <context>
    <type>NULL</type>
    <uri>~ /\.(.*)</uri>
    <accessControl>
      <deny>ALL</deny>
    </accessControl>
  </context>

  <!-- ======================================================== -->
  <!--  Static File Handler (no PHP execution for static assets) -->
  <!-- ======================================================== -->
  <context>
    <type>NULL</type>
    <uri>~ \.(css|gif|ico|jpeg|jpg|js|png|svg|woff|woff2|ttf|eot|otf|bmp|tiff|webp|avif)$</uri>
    <allowOverride>0</allowOverride>
    <addMimeTypes>0</addMimeTypes>
    <baseURI>$DOC_ROOT</baseURI>
  </context>

  <!-- ======================================================== -->
  <!--  Error Pages                                              -->
  <!-- ======================================================== -->
  <errorPages>
    <errorPage>
      <errorCode>404</errorCode>
      <url>/index.php?error=404</url>
    </errorPage>
    <errorPage>
      <errorCode>500</errorCode>
      <url>/index.php?error=500</url>
    </errorPage>
  </errorPages>

  <!-- ======================================================== -->
  <!--  Script Handler Override                                  -->
  <!-- ======================================================== -->
  <scriptHandler>
    <add>
      <extension>php</extension>
      <handler>lsapi:lsphp{{PHP_VERSION}}</handler>
    </add>
  </scriptHandler>

  <!-- ======================================================== -->
  <!--  PHP Configuration                                        -->
  <!-- ======================================================== -->
  <phpIniOverride>
    <memory_limit>256M</memory_limit>
    <upload_max_filesize>64M</upload_max_filesize>
    <post_max_size>128M</post_max_size>
    <max_execution_time>300</max_execution_time>
    <max_input_vars>3000</max_input_vars>
    <display_errors>Off</display_errors>
    <log_errors>On</log_errors>
    <opcache.enable>1</opcache.enable>
    <opcache.memory_consumption>128</opcache.memory_consumption>
    <opcache.max_accelerated_files>10000</opcache.max_accelerated_files>
    <opcache.revalidate_freq>60</opcache.revalidate_freq>
    <realpath_cache_size>4096K</realpath_cache_size>
    <realpath_cache_ttl>600</realpath_cache_ttl>
  </phpIniOverride>

  <!-- ======================================================== -->
  <!--  General Settings                                         -->
  <!-- ======================================================== -->
  <maxConns>200</maxConns>
  <maxSSLConns>200</maxSSLConns>
  <maxReqConn>10</maxReqConn>
  <maxReqBodySize>67108864</maxReqBodySize>
  <smartKeepAlive>0</smartKeepAlive>
  <instantiateOnStartup>1</instantiateOnStartup>
</virtualHostConfig>

<!--
  ============================================================
  HTTPS Configuration (applied after SSL is installed via install-ssl.sh)
  ============================================================
  The install-ssl.sh script will inject the following settings:

  <vhssl>
    <keyFile>/etc/letsencrypt/live/{{DOMAIN}}/privkey.pem</keyFile>
    <certFile>/etc/letsencrypt/live/{{DOMAIN}}/fullchain.pem</certFile>
    <certChain>/etc/letsencrypt/live/{{DOMAIN}}/chain.pem</certChain>
    <sslProtocol>TLSv1.2 TLSv1.3</sslProtocol>
    <enableECDHE>1</enableECDHE>
    <renegProtection>1</renegProtection>
    <sslSessionCache>1</sslSessionCache>
    <enableSpdy>0</enableSpdy>
    <enableH2>1</enableH2>
    <h2c>0</h2c>
  </vhssl>

  And will add the HSTS header:
    <add>Strict-Transport-Security "max-age=31536000; includeSubDomains" always</add>
-->
